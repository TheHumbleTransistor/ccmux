# TODO: desired status bar formatting:
# tmux status rules
# - Bell takes priority (red)
# - Recent activity (< 5s since last output) shows green
# - Otherwise normal grey
# - Current window: bold + slightly lighter grey background

set -g mouse on

# Status bar color scheme - dark grey theme
set -g status-style "bg=colour235,fg=colour245"  # Dark grey background, light grey text
set -g status-left-style "bg=colour235,fg=colour250"
set -g status-right-style "bg=colour235,fg=colour250"

# Window status formatting with separators
set -g window-status-format " #I:#W "  # Inactive windows: index:name with padding
set -g window-status-current-format "#[bg=colour237,fg=colour250,bold] #I:#W #[default]"  # Current window: highlighted
set -g window-status-separator "│"  # Separator between windows

# Window status styles
set -g window-status-style "bg=colour235,fg=colour245"  # Inactive windows: match status bar
set -g window-status-current-style "bg=colour237,fg=colour250,bold"  # Current window: slightly lighter grey, bold

set -g monitor-activity on
set -g bell-action any
set -g visual-activity on
set -g visual-bell off

set -g window-status-activity-style "bold,underscore,fg=yellow"
set -g window-status-bell-style "bold,reverse,fg=red"

bind-key C-l display-message "Clearing marks" \; set -g monitor-activity off \; set -g monitor-activity on
set -g set-titles on
set -g set-titles-string "tmux:#S · #W"
bind-key a last-window
