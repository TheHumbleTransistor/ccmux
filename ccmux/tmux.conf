# tmux status rules
# - Bell takes priority (red)
# - Recent activity (< 5s since last output) shows green
# - Otherwise normal grey
# - Current window: bold + slightly lighter grey background

set -g mouse on

# ----- Status bar color scheme (dark grey) -----
set -g status-style "bg=colour235,fg=colour245"
set -g status-left-style "bg=colour235,fg=colour250"
set -g status-right-style "bg=colour235,fg=colour250"
set -g window-status-separator "│"

# Base styles for inactive/current windows
set -g window-status-style "bg=colour235,fg=colour245"
set -g window-status-current-style "bg=colour237,fg=colour250,bold"

# We will manage highlights ourselves - disable built-in styles
set -g window-status-activity-style "default"
# Keep bell and silence styles neutral to prevent background changes
set -g window-status-bell-style "default"

# ----- Monitoring -----
# Use built-in tmux flags only (no custom hooks):
#  - '!' bell, '#' activity, '~' silence
setw -g monitor-activity on
setw -g monitor-silence 5      # silence flag '~' after 5 seconds
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g activity-action none
set -g silence-action none
set -g bell-action any

# ----- Window status formatting (priority: bell > silence > activity > normal) -----
# Simpler, robust conditionals: each branch prints the label; no style-only branches.
# Conditions use window_flags: '!' (bell), '~' (silence), '#' (activity).

# Inactive windows - priority: bell > silence > activity > normal
# Silence overrides activity to show grey (not green)
set -g window-status-format '#{?window_bell_flag,#[fg=red bold],#{?window_silence_flag,#[fg=colour245],#{?window_activity_flag,#[fg=green],#[fg=colour245]}}} #I:#W '

# Current window - simple format with just lighter background and bold
set -g window-status-current-format '#[bg=colour237,fg=colour250,bold] #I:#W '

# Ensure tmux's built-in activity/bell styles don't interfere
set -g window-status-activity-style "default"
set -g window-status-bell-style "default"

# ----- Misc -----
bind-key C-l display-message "Clearing marks" \; set -g monitor-activity off \; set -g monitor-activity on
set -g set-titles on
set -g set-titles-string "tmux:#S · #W"
bind-key a last-window
