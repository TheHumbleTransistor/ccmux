# ccmux inner-session tmux configuration
# Applied per-session (does not affect other tmux sessions)
#
# To use in your own ~/.tmux.conf:

set -g mouse on
set -g status off
set -g set-titles on
set -g set-titles-string "tmux:#S · #W"

# True-color support (optional — uncomment if needed):
#   set -g default-terminal "tmux-256color"
#   set -as terminal-features ",xterm-256color:RGB"
